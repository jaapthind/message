<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Message Dispatcher</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){
            emailjs.init("27EYkHCfKspCvSfbq");
        })();
    </script>
    <style>
        :root {
            --pos-bg: #f0f2f5;
            --pos-accent: #42b72a;
            --neg-bg: #2d0000;
            --neg-accent: #ff4d4d;
            --transition: 0.4s;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--pos-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color var(--transition);
        }
        body:not(.naughty-mode) { 
            background: url('sunny.jpeg') center center / cover no-repeat fixed !important; 
            image-rendering: -webkit-optimize-contrast; 
        }
        body.naughty-mode { 
            background: url('hell.jpg') center center / cover no-repeat fixed !important;
            background-color: var(--neg-bg); 
            image-rendering: -webkit-optimize-contrast; 
        }

        .container {
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(45px) saturate(280%) brightness(105%);
            -webkit-backdrop-filter: blur(45px) saturate(280%) brightness(105%);
            padding: 50px;
            border-radius: 45px; 
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.25), 
                inset 0 1px 1px 0 rgba(255, 255, 255, 0.6), 
                inset 0 -1px 1px 0 rgba(255, 255, 255, 0.2); 
            text-align: center;
            max-width: 450px;
            width: 90%;
            position: relative;
            overflow: hidden;
            z-index: 1;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }

        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                145deg, 
                rgba(255, 255, 255, 0.2) 0%, 
                rgba(255, 255, 255, 0) 60%, 
                rgba(255, 255, 255, 0.05) 100%
            );
            pointer-events: none;
            z-index: -1;
        }

        body.naughty-mode .container {
            border: 2px solid var(--neg-accent);
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.4);
        }

        h1, .toggle-container span {
            color: #000000 !important;
            font-size: 2.5rem;
            margin-bottom: 15px;
            position: relative;
            z-index: 10;
        }

        .toggle-container {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            position: relative;
            z-index: 10;
        }

        /* CIRCLE BUTTON FIX */
        .circle-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid #ffffff;
            background-color: var(--pos-accent);
            cursor: pointer;
            outline: none;
            transition: background-color 0.4s, transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 10;
            padding: 0;
        }

        .circle-btn:active {
            transform: scale(0.85);
        }

        body.naughty-mode .circle-btn {
            background-color: var(--neg-accent);
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.5);
        }
        /* END CIRCLE BUTTON FIX */

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            z-index: 10;
        }

        input[type="email"] {
            padding: 15px;
            border: 1px solid #dddfe2;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        button#send-btn {
            background-color: var(--pos-accent);
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            position: relative;
            z-index: 10;
        }

        body.naughty-mode button#send-btn {
            background-color: var(--neg-accent);
        }

        button#send-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #message-area {
            margin-top: 30px;
            padding: 25px;
            border-radius: 8px;
            display: none;
            position: relative;
            z-index: 10;
        }

        .pos-msg { background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.3); color: #000000 !important; }
        .neg-msg { background: rgba(0, 0, 0, 0.3); border: 1px solid #ff4d4d; color: #000000 !important; }

        #generated-message {
            font-style: italic;
            font-size: 1.3rem;
            margin: 15px 0;
        }

        .loader {
            display: none;
            margin: 10px auto;
            border: 4px solid #f3f3f3;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        body:not(.naughty-mode) .loader { border-top: 4px solid var(--pos-accent); }
        body.naughty-mode .loader { border-top: 4px solid var(--neg-accent); }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        @media (max-width: 600px) {
            body { padding: 15px; }
            .container { 
                width: 100%; 
                padding: 30px 15px; 
                box-sizing: border-box; 
            }
            h1 { font-size: 1.8rem; }
            input[type="email"], button#send-btn { 
                width: 100%; 
                font-size: 16px; 
                padding: 12px;
            }
        }
        .circle-btn::after {
            content: "▲";
            position: absolute;
            top: -25px; /* Sits right above the button */
            left: 50%;
            transform: translateX(-50%) rotate(-90deg); /* Points Left by default */
            font-size: 14px;
            color: white;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        body.naughty-mode .circle-btn::after {
            transform: translateX(-50%) rotate(90deg); /* Flips to point Right */
            color: #ff4d4d; /* Changes arrow color to match the roast vibe */
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="main-title">Send a message</h1>
    
    <div class="toggle-container">
        <span>Positive</span>
        <button id="mood-toggle-btn" class="circle-btn" aria-label="Toggle Mood"></button>
        <span>ROASTS</span>
    </div>

    <div id="input-section" class="input-group">
        <input type="email" id="email" placeholder="Recipient's email" required>
        <button id="send-btn">Send Message</button>
        <div id="loader" class="loader"></div>
    </div>

    <div id="message-area">
        <div id="success-header" class="success-header">Message Sent</div>
        <div id="generated-message"></div>
        <button style="margin-top:20px; background-color:#606770; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;" onclick="location.reload()">Reset</button>
    </div>
</div>

<script>
    const posBanks = [
        [
            "Your kindness", "Your energy", "Your smile", "Your persistence", "Your perspective", "Your spirit", "Your hard work", "Your creativity", "Your presence", "Your compassion",
            "Your optimism", "Your bravery", "Your wisdom", "Your focus", "Your generosity", "Your leadership", "Your patience", "Your passion", "Your honesty", "Your curiosity",
            "Your resilience", "Your warmth", "Your talent", "Your confidence", "Your empathy", "Your dedication", "Your loyalty", "Your vision", "Your support", "Your humor",
            "Your grace", "Your strength", "Your ambition", "Your humility", "Your kindness", "Your glow", "Your effort", "Your genius", "Your light", "Your vibe",
            "Your heart", "Your drive", "Your soul", "Your aura", "Your intelligence", "Your friendship", "Your courage", "Your integrity", "Your care", "Your belief"
        ],
        [
            "brings so much light to", "makes a massive difference in", "inspires everyone within", "adds incredible value to", "creates a ripple of joy in", "strengthens the bond of", "perfectly illuminates", "genuinely improves", "anchors the happiness of", "sets a beautiful example for",
            "deeply encourages", "totally transforms", "completely uplifts", "naturally brightens", "powerfully impacts", "consistently helps", "beautifully shapes", "positively changes", "effectively supports", "wonderfully enhances",
            "always protects", "greatly enriches", "steadily guides", "instantly warms", "quietly empowers", "sharply focuses", "kindly softens", "boldly leads", "clearly defines", "magically creates",
            "safely guards", "truly honors", "richly fills", "proudly carries", "humbly serves", "loyally stands by", "bravely faces", "brightly shines on", "warmly welcomes", "honestly represents",
            "skillfully builds", "happily shares", "carefully tends to", "wisely teaches", "fairly judges", "calmly handles", "patiently waits for", "gladly gives to", "deeply loves", "strongly backs"
        ],
        [
            "the world around you", "every room you enter", "this entire community", "the lives of your friends", "all of your future goals", "the hearts of others", "our shared journey", "the challenges you face", "the people who know you", "every day of the year",
            "the local neighborhood", "the school hallways", "the entire family", "the people nearby", "every single moment", "the path ahead", "the social circle", "the modern world", "the global community", "the human spirit",
            "the minds of many", "the souls of all", "the team environment", "the creative space", "the circle of trust", "the field of play", "the digital world", "the natural beauty", "the flow of life", "the future generations",
            "the hearts of many", "the spirits of all", "the collective group", "the workspace", "the study group", "the friendship circle", "the entire planet", "the universe itself", "the morning light", "the evening peace",
            "the quiet moments", "the big events", "the small details", "the daily routine", "the holiday season", "the weekend vibe", "the summer days", "the winter nights", "the spring growth", "the autumn harvest"
        ]
    ];

    const negBanks = [
        [
            "Your life", "Your face", "Your breath", "Your room", "Your soul", 
            "Your future", "Your ego", "Your brain", "Your hygiene", "Your haircut", 
            "Your logic", "Your style", "Your vibe", "Your reputation", "Your personality", 
            "Your attitude", "Your presence", "Your history", "Your energy", "Your look", 
            "Your character", "Your mouth", "Your spirit", "Your mind", "Your logic", 
            "Your work", "Your cooking", "Your room", "Your phone", "Your legacy",
            "Your bedroom", "Your outfit", "Your shoes", "Your voice", "Your laugh",
            "Your kitchen", "Your desk", "Your car", "Your bank account", "Your effort",
            "Your ideas", "Your talent", "Your social life", "Your memory", "Your luck",
            "Your style", "Your fashion", "Your behavior", "Your habits", "Your choices"
        ],
        [
            "smells like", "looks like", "tastes like", "feels like", "acts like", 
            "sounds like", "is full of", "is basically", "is exactly like", "is just", 
            "reminds me of", "is clearly", "is nothing but", "shows off", "is really", 
            "always seems like", "is definitely", "mostly contains", "actually is", "looks mostly like", 
            "is 100% just", "is purely", "is only", "is quite literally", "looks exactly like", 
            "is simply", "is totally", "is naturally", "is honestly", "is truly"
        ],
        [
            "trash", "failure", "garbage", "sewage", "disaster", 
            "misery", "shame", "rot", "filth", "waste", 
            "defeat", "regret", "ugliness", "poison", "pollution", 
            "chaos", "emptiness", "stupidity", "crust", "dirt", 
            "mold", "slime", "ruins", "decay", "vomit", 
            "despair", "embarrassment", "tragedy", "doom", "nothingness",
            "dog food", "old socks", "wet cardboard", "burnt toast", "stale air",
            "used tissues", "bad math", "a dumpster fire", "a train wreck", "a total joke",
            "cold grease", "sour milk", "broken glass", "rusty nails", "toxic sludge",
            "dead batteries", "dirty water", "muddy shoes", "lost hopes", "pure salt"
        ]
    ];

    const body = document.body;
    const title = document.getElementById('main-title');
    const toggleBtn = document.getElementById('mood-toggle-btn');

    toggleBtn.addEventListener('click', () => {
        if(body.classList.contains('naughty-mode')) {
            body.classList.remove('naughty-mode');
            title.textContent = "Be Kind";
        } else {
            body.classList.add('naughty-mode');
            title.textContent = "Be Mean";
        }
    });

    function generateMessage(isNaughty) {
        const banks = isNaughty ? negBanks : posBanks;
        const p1 = banks[0][Math.floor(Math.random() * banks[0].length)];
        const p2 = banks[1][Math.floor(Math.random() * banks[1].length)];
        const p3 = banks[2][Math.floor(Math.random() * banks[2].length)];
        return `${p1} ${p2} ${p3}.`;
    }

    document.getElementById('send-btn').addEventListener('click', () => {
        const emailValue = document.getElementById('email').value.trim();
        const sendBtn = document.getElementById('send-btn');
        const loader = document.getElementById('loader');
        const isNaughty = document.body.classList.contains('naughty-mode');

        if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailValue)) {
            sendBtn.disabled = true;
            loader.style.display = "block";
            
            const finalMessage = generateMessage(isNaughty);

            emailjs.send('service_sdx4kgt', 'template_sr9v9ps', {
                to_email: emailValue,
                message: finalMessage
            }).then(() => {
                loader.style.display = "none";
                document.getElementById('input-section').style.display = 'none';
                const area = document.getElementById('message-area');
                area.style.display = 'block';
                area.className = isNaughty ? 'neg-msg' : 'pos-msg';
                document.getElementById('success-header').textContent = isNaughty ? "🔥 Roast Delivered!" : "✨ Positivity Sent!";
                document.getElementById('generated-message').textContent = `"${finalMessage}"`;
            }, (err) => {
                loader.style.display = "none";
                sendBtn.disabled = false;
                alert("Error: Check your EmailJS dashboard.");
                console.error(err);
            });
        } else {
            alert("Enter a valid email.");
        }
    });
</script>

</body>
</html>
