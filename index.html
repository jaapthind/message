<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Positivity Sender</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){
            emailjs.init("27EYkHCfKspCvSfbq");
        })();
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #1c1e21;
        }

        .container {
            background-color: #ffffff;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h1 {
            color: #42b72a;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.1rem;
            color: #606770;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="email"] {
            padding: 15px;
            border: 1px solid #dddfe2;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="email"]:focus {
            border-color: #42b72a;
        }

        button {
            background-color: #42b72a;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #36a420;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #message-area {
            margin-top: 30px;
            padding: 25px;
            background-color: #f6fef5;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            display: none;
        }

        .success-header {
            color: #155724;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        #generated-message {
            font-style: italic;
            font-size: 1.3rem;
            color: #2d3436;
            word-wrap: break-word;
        }

        .loader {
            display: none;
            margin: 10px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #42b72a;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Be Kind</h1>
    <p>Send a randomized uplifting message to someone's inbox instantly.</p>
    
    <div id="input-section" class="input-group">
        <input type="email" id="email" placeholder="Enter recipient's email" required>
        <button id="send-btn">Send Positivity</button>
        <div id="loader" class="loader"></div>
    </div>

    <div id="message-area">
        <div class="success-header">✨ Message Dispatched!</div>
        <div id="generated-message"></div>
        <button style="margin-top:20px; background-color:#606770;" onclick="location.reload()">Send Another</button>
    </div>
</div>

<script>
    const bank1 = ["You are", "Your ener", "Your smile", "Your persistence", "Your perspective", "Your spirit", "Your hard work", "Your creativity", "Your presence", "The way you help"];
    const bank2 = ["brings so much light to", "makes a massive difference in", "inspires everyone within", "adds incredible value to", "creates a ripple of joy in", "strengthens the bond of", "perfectly illuminates", "genuinely improves", "anchors the happiness of", "sets a beautiful example for"];
    const bank3 = ["the world around you", "every room you enter", "this entire community", "the lives of your friends", "all of your future goals", "the hearts of others", "our shared journey", "the challenges you face", "the people who know you", "every day of the year"];

    function generateMessage() {
        const p1 = bank1[Math.floor(Math.random() * bank1.length)];
        const p2 = bank2[Math.floor(Math.random() * bank2.length)];
        const p3 = bank3[Math.floor(Math.random() * bank3.length)];
        return `${p1} ${p2} ${p3}.`;
    }

    document.getElementById('send-btn').addEventListener('click', () => {
        const emailInput = document.getElementById('email');
        const emailValue = emailInput.value.trim();
        const sendBtn = document.getElementById('send-btn');
        const loader = document.getElementById('loader');

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        
        if (emailRegex.test(emailValue)) {
            sendBtn.disabled = true;
            loader.style.display = "block";
            
            const finalMessage = generateMessage();

            const templateParams = {
                to_email: emailValue,
                message: finalMessage
            };

            emailjs.send('service_mj6xima', 'template_sr9v9ps', templateParams)
                .then(function(response) {
                    loader.style.display = "none";
                    document.getElementById('input-section').style.display = 'none';
                    document.getElementById('message-area').style.display = 'block';
                    document.getElementById('generated-message').textContent = `"${finalMessage}"`;
                    console.log('SUCCESS!', response.status, response.text);
                }, function(error) {
                    loader.style.display = "none";
                    sendBtn.disabled = false;
                    alert("FAILED to send message. Please check your EmailJS dashboard settings.");
                    console.error('FAILED...', error);
                });
            
        } else {
            alert("Please enter a valid email address.");
        }
    });
</script>

</body>
</html>
